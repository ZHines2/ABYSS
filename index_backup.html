<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ABYSS — Living Pixel Biome 2D</title>
<style>
body{margin:0;background:#111;color:#eee;font:14px/1.4 monospace;overflow:hidden}
.wrap{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box}
h1{margin:0 0 20px;text-align:center;font-size:24px}
.row{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.panel{background:#222;border:1px solid #555;border-radius:8px;padding:20px}
canvas{display:block;border:2px solid #666;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges}
.btn{background:#333;border:1px solid #666;color:#eee;padding:8px 16px;border-radius:4px;cursor:pointer;font:inherit}
.btn:hover{background:#444;border-color:#888}
.controls{display:flex;flex-direction:column;gap:10px;margin-top:10px}
label{display:flex;flex-direction:column;gap:4px;font-size:12px}
input[type=range]{width:200px}
.biome-info{background:#333;padding:10px;border-radius:4px;margin-top:10px;font-size:11px}
.stats{margin-top:10px;font-size:11px;color:#999}
</style>
</head>
<body>

<div class="wrap">
  <h1>ABYSS — <span style="opacity:.8">3D Pixel Biome Exploration</span></h1>
  <div class="row">
    <div class="panel">
      <!-- Low-res canvas scaled up for chunky pixels -->
      <canvas id="gl" width="320" height="180" style="width:min(90vw,800px);height:calc(min(90vw,800px)*0.5625);"></canvas>
    </div>
    <div class="panel" style="min-width:260px;max-width:340px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <button class="btn" id="regen">New Biome</button>
        <button class="btn" id="pause">Pause</button>
        <button class="btn" id="reset">Reset View</button>
      </div>
      <div class="grid">
        <label>Grid Resolution
          <input id="res" type="range" min="32" max="96" step="16" value="64">
        </label>
        <label>Light Levels
          <input id="steps" type="range" min="2" max="8" value="4">
        </label>
        <label>Water Level
          <input id="water" type="range" min="0.15" max="0.5" step="0.01" value="0.28">
        </label>
        <label>Rock Height
          <input id="rock" type="range" min="0.55" max="0.9" step="0.01" value="0.75">
        </label>
        <label>Tree Density
          <input id="trees" type="range" min="0.45" max="0.85" step="0.01" value="0.62">
        </label>
        <label>Auto‑Rotate Speed
          <input id="rot" type="range" min="-1.5" max="1.5" step="0.01" value="0.35">
        </label>
      </div>
      <p>Drag to orbit • Wheel to zoom • This is the foundation for ABYSS game states.</p>
    </div>
  </div>
</div>

<!-- Game State Panel -->
<div class="game-state" id="gameState">
  <div class="state-title">The Abyss Calls</div>
  <div class="state-desc">You stand at the edge of an infinite pixel realm. Each biome holds secrets, each height tells a story of what lies beneath.</div>
  <div class="actions">
    <button class="action-btn" onclick="exploreWater()">Descend to Water's Edge</button>
    <button class="action-btn" onclick="climbRock()">Ascend the Rocky Heights</button>
    <button class="action-btn" onclick="wanderForest()">Wander Through Trees</button>
    <button class="action-btn" onclick="seekGrass()">Rest in Grasslands</button>
  </div>
  <div class="progress" id="progress">Click actions to explore the pixel abyss...</div>
</div>

<script>
// ---------- WebGL Setup ----------
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl');
if (!gl) {
  alert('WebGL not supported');
  throw new Error('WebGL not supported');
}

// Vertex shader
const vertSrc = `
  attribute vec3 a_pos; // x,z on plane, y = height
  attribute vec3 a_norm;
  attribute float a_biome; // 0 water, 1 grass, 2 tree, 3 rock
  uniform mat4 u_mvp;
  varying vec3 v_n;
  varying float v_b;
  varying float v_h;
  void main(){
    v_n = a_norm;
    v_b = a_biome;
    v_h = a_pos.y;
    gl_Position = u_mvp * vec4(a_pos,1.0);
  }`;

// Fragment shader  
const fragSrc = `
  precision mediump float;
  varying vec3 v_n; varying float v_b; varying float v_h;
  uniform vec3 u_lightDir;
  uniform float u_steps; // palette steps
  // palettes
  vec3 water = vec3(0.12,0.36,1.0);
  vec3 grass = vec3(0.35,0.78,0.41);
  vec3 tree  = vec3(0.18,0.48,0.27);
  vec3 rock  = vec3(0.63,0.60,0.65);
  vec3 pick(float b){
    if(b<0.5) return water; else if(b<1.5) return grass; else if(b<2.5) return tree; else return rock;
  }
  void main(){
    // Lambert, but quantized to steps
    float l = max(dot(normalize(v_n), normalize(u_lightDir)), 0.0);
    float q = floor(l*u_steps)/u_steps; // posterize
    vec3 base = pick(v_b);
    gl_FragColor = vec4(base*q, 1.0);
  }`;

function compile(type,src){const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s); return s}
const prog = gl.createProgram(); gl.attachShader(prog, compile(gl.VERTEX_SHADER,vertSrc)); gl.attachShader(prog, compile(gl.FRAGMENT_SHADER,fragSrc)); gl.linkProgram(prog); if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw gl.getProgramInfoLog(prog);
gl.useProgram(prog);

// Uniforms
const u_mvp = gl.getUniformLocation(prog,'u_mvp');
const u_lightDir = gl.getUniformLocation(prog,'u_lightDir');
const u_steps = gl.getUniformLocation(prog,'u_steps');

// Attributes
const attribs = {
  a_pos: gl.getAttribLocation(prog,'a_pos'),
  a_norm: gl.getAttribLocation(prog,'a_norm'),
  a_biome: gl.getAttribLocation(prog,'a_biome'),
};

// ---------- World Generation ----------
let buffers=null, counts=0;
const state = {
  seed: (Math.random()*1e9)>>>0,
  res: 64,
  steps: 4,
  water: 0.28,
  rock: 0.75,
  trees: 0.62,
  rotSpeed: 0.35,
  paused: false,
  cam: {yaw:0.6, pitch:-0.5, dist:3.0}
};

// Simple value noise
function makeValueNoise(seed) {
  function hash(x, y) {
    let h = seed ^ ((x * 374761393) + (y * 668265263));
    h = (h ^ (h >>> 13)) * 1274126177;
    return (h ^ (h >>> 16)) / 4294967296;
  }
  return function(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const a = hash(ix, iy), b = hash(ix+1, iy), c = hash(ix, iy+1), d = hash(ix+1, iy+1);
    const i1 = a + (b-a) * fx, i2 = c + (d-c) * fx;
    return i1 + (i2-i1) * fy;
  };
}

function buildMesh(){
  const N = state.res;
  const heightN = makeValueNoise(state.seed ^ 0xA53);
  const moistN = makeValueNoise(state.seed ^ 0xBEE);
  const scaleH = 2.0, scaleM = 2.8;
  const hAmp = 0.25;

  const vcount = (N+1)*(N+1);
  const icount = N*N*6;
  const pos = new Float32Array(vcount*3);
  const norm = new Float32Array(vcount*3);
  const bio = new Float32Array(vcount);
  const idx = new Uint16Array(icount);

  function hAt(x,z){return heightN(x*scaleH, z*scaleH);}
  function mAt(x,z){return moistN(x*scaleM, z*scaleM);}

  let p=0, b=0;
  for(let j=0; j<=N; j++){
    for(let i=0; i<=N; i++){
      const x = (i/N - 0.5) * 2;
      const z = (j/N - 0.5) * 2;
      const h = hAt(x,z) * hAmp;
      const m = mAt(x,z);
      
      pos[p++] = x; pos[p++] = h; pos[p++] = z;
      
      // Determine biome
      let biome;
      if(h < state.water*hAmp) biome = 0; // water
      else if(h > state.rock*hAmp) biome = 3; // rock  
      else if(m > state.trees) biome = 2; // tree
      else biome = 1; // grass
      bio[b++] = biome;
    }
  }

  // Calculate normals and indices
  let n=0, idx_i=0;
  for(let j=0; j<=N; j++){
    for(let i=0; i<=N; i++){
      // Simple normal calculation
      const dx = i<N ? pos[(j*(N+1)+(i+1))*3+1] - pos[(j*(N+1)+i)*3+1] : 0;
      const dz = j<N ? pos[((j+1)*(N+1)+i)*3+1] - pos[(j*(N+1)+i)*3+1] : 0;
      const len = Math.sqrt(dx*dx + 1 + dz*dz);
      norm[n++] = -dx/len; norm[n++] = 1/len; norm[n++] = -dz/len;
      
      // Indices for quads
      if(i<N && j<N){
        const tl = j*(N+1)+i, tr = tl+1, bl = (j+1)*(N+1)+i, br = bl+1;
        idx[idx_i++] = tl; idx[idx_i++] = bl; idx[idx_i++] = tr;
        idx[idx_i++] = tr; idx[idx_i++] = bl; idx[idx_i++] = br;
      }
    }
  }

  // Create buffers
  if(buffers) {
    gl.deleteBuffer(buffers.pos);
    gl.deleteBuffer(buffers.norm);
    gl.deleteBuffer(buffers.bio);
    gl.deleteBuffer(buffers.idx);
  }
  
  buffers = {
    pos: gl.createBuffer(),
    norm: gl.createBuffer(), 
    bio: gl.createBuffer(),
    idx: gl.createBuffer()
  };
  
  gl.bindBuffer(gl.ARRAY_BUFFER, buffers.pos);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);
  
  gl.bindBuffer(gl.ARRAY_BUFFER, buffers.norm);
  gl.bufferData(gl.ARRAY_BUFFER, norm, gl.STATIC_DRAW);
  
  gl.bindBuffer(gl.ARRAY_BUFFER, buffers.bio);
  gl.bufferData(gl.ARRAY_BUFFER, bio, gl.STATIC_DRAW);
  
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffers.idx);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idx, gl.STATIC_DRAW);
  
  counts = icount;
}

// ---------- Camera and Matrix Math ----------
function perspective(fov, aspect, near, far) {
  const f = 1 / Math.tan(fov/2);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)/(near-far), (2*far*near)/(near-far),
    0, 0, -1, 0
  ]);
}

function multiply(a, b) {
  const result = new Float32Array(16);
  for(let i=0; i<4; i++) {
    for(let j=0; j<4; j++) {
      result[i*4+j] = a[i*4]*b[j] + a[i*4+1]*b[4+j] + a[i*4+2]*b[8+j] + a[i*4+3]*b[12+j];
    }
  }
  return result;
}

function lookAt(eye, center, up) {
  const f = [center[0]-eye[0], center[1]-eye[1], center[2]-eye[2]];
  const flen = Math.sqrt(f[0]*f[0] + f[1]*f[1] + f[2]*f[2]);
  f[0]/=flen; f[1]/=flen; f[2]/=flen;
  
  const s = [f[1]*up[2]-f[2]*up[1], f[2]*up[0]-f[0]*up[2], f[0]*up[1]-f[1]*up[0]];
  const slen = Math.sqrt(s[0]*s[0] + s[1]*s[1] + s[2]*s[2]);
  s[0]/=slen; s[1]/=slen; s[2]/=slen;
  
  const u = [s[1]*f[2]-s[2]*f[1], s[2]*f[0]-s[0]*f[2], s[0]*f[1]-s[1]*f[0]];
  
  return new Float32Array([
    s[0], u[0], -f[0], 0,
    s[1], u[1], -f[1], 0,
    s[2], u[2], -f[2], 0,
    -(s[0]*eye[0]+s[1]*eye[1]+s[2]*eye[2]),
    -(u[0]*eye[0]+u[1]*eye[1]+u[2]*eye[2]),
    (f[0]*eye[0]+f[1]*eye[1]+f[2]*eye[2]), 1
  ]);
}

// ---------- Render Loop ----------
function render(time) {
  if(!state.paused) {
    state.cam.yaw += state.rotSpeed * 0.01;
  }
  
  const cx = Math.cos(state.cam.yaw) * Math.cos(state.cam.pitch) * state.cam.dist;
  const cy = Math.sin(state.cam.pitch) * state.cam.dist;
  const cz = Math.sin(state.cam.yaw) * Math.cos(state.cam.pitch) * state.cam.dist;
  
  const proj = perspective(Math.PI/4, canvas.width/canvas.height, 0.1, 10);
  const view = lookAt([cx,cy,cz], [0,0,0], [0,1,0]);
  const mvp = multiply(proj, view);
  
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0.05, 0.05, 0.1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  
  if(buffers) {
    gl.uniformMatrix4fv(u_mvp, false, mvp);
    gl.uniform3f(u_lightDir, 0.3, 0.7, 0.6);
    gl.uniform1f(u_steps, state.steps);
    
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.pos);
    gl.enableVertexAttribArray(attribs.a_pos);
    gl.vertexAttribPointer(attribs.a_pos, 3, gl.FLOAT, false, 0, 0);
    
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.norm);
    gl.enableVertexAttribArray(attribs.a_norm);
    gl.vertexAttribPointer(attribs.a_norm, 3, gl.FLOAT, false, 0, 0);
    
    gl.bindBuffer(gl.ARRAY_BUFFER, buffers.bio);
    gl.enableVertexAttribArray(attribs.a_biome);
    gl.vertexAttribPointer(attribs.a_biome, 1, gl.FLOAT, false, 0, 0);
    
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffers.idx);
    gl.drawElements(gl.TRIANGLES, counts, gl.UNSIGNED_SHORT, 0);
  }
  
  requestAnimationFrame(render);
}

// ---------- Game State System ----------
const gameStates = {
  water: { title: "Depths Unknown", desc: "The pixel waters ripple with hidden currents. Ancient data flows beneath the surface, carrying whispers of what was lost in the digital abyss.", actions: ["Dive Deeper", "Surface", "Listen to Currents"] },
  rock: { title: "Peak of Revelation", desc: "From these rocky heights, you see the pattern of the abyss spread below. Each pixel a star in a constellation of mysteries waiting to be decoded.", actions: ["Survey the Realm", "Descend", "Seek Higher Ground"] },
  forest: { title: "Grove of Secrets", desc: "Pixel trees tower around you, their geometric branches holding fragments of forgotten code. The forest breathes with the rhythm of processing cycles.", actions: ["Read the Trees", "Follow the Path", "Rest Among Roots"] },
  grass: { title: "Fields of Memory", desc: "Endless grasslands stretch before you, each blade a memory pixel storing echoes of what came before. The wind carries data fragments across the plains.", actions: ["Gather Memories", "Feel the Wind", "Lie in the Grass"] }
};

let currentState = null;
let gameProgress = [];

function updateGameState(biome, action = null) {
  currentState = biome;
  const state = gameStates[biome];
  
  document.querySelector('.state-title').textContent = state.title;
  document.querySelector('.state-desc').textContent = state.desc;
  
  const actionsEl = document.querySelector('.actions');
  actionsEl.innerHTML = '';
  
  state.actions.forEach(actionText => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = actionText;
    btn.onclick = () => performAction(biome, actionText);
    actionsEl.appendChild(btn);
  });
  
  if(action) {
    gameProgress.push(`${biome}: ${action}`);
    document.getElementById('progress').textContent = `Progress: ${gameProgress.length} actions taken in the abyss`;
  }
}

function performAction(biome, action) {
  updateGameState(biome, action);
  
  // Visual feedback - change camera view slightly
  state.cam.yaw += 0.2;
  state.cam.pitch += (Math.random() - 0.5) * 0.1;
  state.cam.dist *= 0.95 + Math.random() * 0.1;
}

// Game action functions
function exploreWater() { updateGameState('water', 'Descended to water'); }
function climbRock() { updateGameState('rock', 'Climbed to rocky heights'); }
function wanderForest() { updateGameState('forest', 'Wandered into trees'); }
function seekGrass() { updateGameState('grass', 'Found grasslands'); }

// ---------- UI Controls ----------
document.getElementById('regen').onclick = () => {
  state.seed = (Math.random()*1e9)>>>0;
  buildMesh();
};

document.getElementById('pause').onclick = () => {
  state.paused = !state.paused;
  document.getElementById('pause').textContent = state.paused ? 'Resume' : 'Pause';
};

document.getElementById('reset').onclick = () => {
  state.cam = {yaw:0.6, pitch:-0.5, dist:3.0};
};

['res','steps','water','rock','trees','rot'].forEach(id => {
  document.getElementById(id).oninput = (e) => {
    const val = parseFloat(e.target.value);
    if(id === 'res') { state.res = val; buildMesh(); }
    else if(id === 'steps') state.steps = val;
    else if(id === 'water') { state.water = val; buildMesh(); }
    else if(id === 'rock') { state.rock = val; buildMesh(); }
    else if(id === 'trees') { state.trees = val; buildMesh(); }
    else if(id === 'rot') state.rotSpeed = val;
  };
});

// Mouse controls
let dragging = false, lastX, lastY;
canvas.onmousedown = (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; };
document.onmouseup = () => dragging = false;
document.onmousemove = (e) => {
  if(dragging) {
    state.cam.yaw += (e.clientX - lastX) * 0.01;
    state.cam.pitch += (e.clientY - lastY) * 0.01;
    state.cam.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, state.cam.pitch));
    lastX = e.clientX; lastY = e.clientY;
  }
};
canvas.onwheel = (e) => {
  state.cam.dist *= 1 + e.deltaY * 0.001;
  state.cam.dist = Math.max(1, Math.min(10, state.cam.dist));
  e.preventDefault();
};

// Initialize
buildMesh();
requestAnimationFrame(render);
updateGameState('grass'); // Start in grasslands
</script>
</body>
</html>
