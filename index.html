<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Pixel Biome — 2D + Little Wanderer</title>
  <style>
    :root{ --bg:#0e0d11; --ink:#e7eaff; --panel:#1a1822; --border:#4e456a; --debug:#1a1b2e; }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}
    
    /* Fullscreen layout */
    .container{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column}
    .canvas-container{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;max-width:100vw;max-height:100vh}
    
    /* Header */
    .header{position:absolute;top:0;left:0;right:0;z-index:100;padding:12px 16px;background:linear-gradient(to bottom, rgba(14,13,17,0.95), transparent);backdrop-filter:blur(4px)}
    .title{font-size:18px;margin:0;text-align:center}
    .title-sub{opacity:0.7;font-size:14px}
    
    /* Debug toggle button */
    .debug-toggle{position:absolute;top:16px;right:16px;z-index:300;background:var(--debug);border:1px solid var(--border);color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all 0.2s ease}
    .debug-toggle:hover{background:#252640;transform:scale(1.05)}
    
    /* Debug modal */
    .debug-modal{position:fixed;top:0;right:0;width:min(380px,100vw);height:100vh;background:var(--debug);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.3s ease;z-index:200;overflow-y:auto;scrollbar-width:thin}
    .debug-modal.open{transform:translateX(0)}
    .debug-modal::-webkit-scrollbar{width:6px}
    .debug-modal::-webkit-scrollbar-track{background:var(--debug)}
    .debug-modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    
    .debug-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .debug-title{font-size:14px;font-weight:bold;margin:0}
    .debug-close{background:none;border:none;color:var(--ink);font-size:18px;cursor:pointer;padding:4px;border-radius:4px}
    .debug-close:hover{background:var(--border)}
    
    /* Status panel */
    .status-panel{position:absolute;top:16px;left:16px;z-index:100;background:rgba(26,24,34,0.95);border:1px solid var(--border);border-radius:8px;padding:12px;backdrop-filter:blur(4px);min-width:180px;font-size:12px}
    .status-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .wanderer-name{font-weight:bold;font-size:14px;color:var(--ink);cursor:pointer}
    .wanderer-name:hover{color:#8892b0}
    .rename-btn{background:none;border:none;color:#8892b0;cursor:pointer;padding:2px;border-radius:3px;font-size:10px}
    .rename-btn:hover{background:var(--border);color:var(--ink)}
    .status-info{margin-bottom:8px}
    .status-item{display:flex;justify-content:space-between;margin-bottom:4px}
    .status-label{color:#8892b0;font-size:11px}
    .status-value{color:var(--ink);font-weight:bold}
    .codex-btn{background:#22253c;border:1px solid #5e64a8;color:#e7eaff;padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;width:100%}
    .codex-btn:hover{background:#2a2d4a}
    
    .debug-content{padding:16px}
    .debug-section{margin-bottom:24px}
    .debug-section h3{font-size:12px;color:#8892b0;margin:0 0 12px 0;text-transform:uppercase;letter-spacing:0.5px}
    
    .btn{cursor:pointer;background:#22253c;border:1px solid #5e64a8;color:#e7eaff;padding:6px 10px;border-radius:6px;font-size:11px;margin:2px}
    .btn:hover{background:#2a2d4a;transform:translateY(-1px)}
    .btn-group{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
    
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    label{display:flex;flex-direction:column;gap:6px;font-size:11px;line-height:1.3;position:relative}
    label span{position:absolute;top:20px;right:4px;background:var(--debug);padding:2px 6px;border-radius:3px;font-size:10px;color:#8892b0;pointer-events:none}
    select, input[type=range]{width:100%;padding:4px}
    input[type=checkbox]{margin-right:8px}
    .note{font-size:10px;opacity:0.75;line-height:1.4;margin-top:12px}
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      .debug-modal{width:100vw}
      .debug-toggle{top:12px;right:12px;padding:6px 10px;font-size:11px}
      .header{padding:8px 12px}
      .title{font-size:16px}
      .title-sub{font-size:12px}
      canvas{touch-action:none}
    }
    
    /* Mobile landscape */
    @media (max-width: 768px) and (orientation: landscape) {
      .debug-modal{width:50vw;min-width:300px}
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1 class="title">ABYSS <span class="title-sub">Pixel Biome Explorer</span></h1>
  </div>
  
  <!-- Debug Toggle Button -->
  <button class="debug-toggle" id="debugToggle">⚙️ Debug</button>
  
  <!-- Status Panel -->
  <div class="status-panel" id="statusPanel">
    <div class="status-header">
      <span class="wanderer-name" id="wandererName">Wanderer</span>
      <button class="rename-btn" id="renameBtn" title="Click to rename">✎</button>
    </div>
    <div class="status-info">
      <div class="status-item">
        <span class="status-label">Position:</span>
        <span class="status-value" id="position">0, 0</span>
      </div>
      <div class="status-item">
        <span class="status-label">XP:</span>
        <span class="status-value" id="xpValue">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">Discoveries:</span>
        <span class="status-value" id="discoveries">0</span>
      </div>
    </div>
    <button class="codex-btn" id="codexBtn">View Codex</button>
  </div>
  
  <!-- Canvas Container -->
  <div class="canvas-container">
    <canvas id="view" width="240" height="240"></canvas>
  </div>
  
  <!-- Debug Modal -->
  <div class="debug-modal" id="debugModal">
    <div class="debug-header">
      <h2 class="debug-title">Debug Controls</h2>
      <button class="debug-close" id="debugClose">×</button>
    </div>
    <div class="debug-content">
      
      <!-- Control Buttons -->
      <div class="debug-section">
        <h3>Actions</h3>
        <div class="btn-group">
          <button class="btn" id="regen">Regenerate (R)</button>
          <button class="btn" id="pause">Pause (P)</button>
          <button class="btn" id="seed">New Seed</button>
          <button class="btn" id="export">Export PNG</button>
        </div>
      </div>
      
      <!-- World Generation -->
      <div class="debug-section">
        <h3>World Generation</h3>
        <div class="grid">
          <label>World Size<input id="size" type="range" min="40" max="160" step="20" value="100"><span id="sizeValue">100</span></label>
          <label>Palette Steps<input id="steps" type="range" min="2" max="8" value="4"><span id="stepsValue">4</span></label>
          <label>Palette Theme
            <select id="theme">
              <option value="forest">Forest</option>
              <option value="autumn">Autumn</option>
              <option value="desert">Desert</option>
              <option value="swamp">Swamp</option>
              <option value="nocturne">Nocturne</option>
            </select>
          </label>
          <label>Water Level<input id="water" type="range" min="0.15" max="0.5" step="0.01" value="0.30"><span id="waterValue">0.30</span></label>
          <label>Rock Height<input id="rock" type="range" min="0.6" max="0.9" step="0.01" value="0.78"><span id="rockValue">0.78</span></label>
          <label>Tree Moisture<input id="trees" type="range" min="0.45" max="0.85" step="0.01" value="0.62"><span id="treesValue">0.62</span></label>
        </div>
      </div>
      
      <!-- Visual Effects -->
      <div class="debug-section">
        <h3>Visual Effects</h3>
        <div class="grid">
          <label>Wind Speed<input id="wind" type="range" min="0" max="2.0" step="0.01" value="0.8"><span id="windValue">0.8</span></label>
          <label>Shadow Strength<input id="shadow" type="range" min="0" max="0.6" step="0.02" value="0.35"><span id="shadowValue">0.35</span></label>
          <label>Day/Night Enabled<input id="todOn" type="checkbox" checked></label>
          <label>Day/Night Speed<input id="todSpeed" type="range" min="0" max="0.1" step="0.005" value="0.02"><span id="todSpeedValue">0.02</span></label>
          <label>Altitude Influence<input id="altInfluence" type="range" min="0" max="0.6" step="0.02" value="0.25"><span id="altInfluenceValue">0.25</span></label>
          <label>Contours<input id="contours" type="checkbox" checked></label>
          <label>Contour Step<input id="contourStep" type="range" min="0.05" max="0.3" step="0.01" value="0.1"><span id="contourStepValue">0.1</span></label>
        </div>
      </div>
      
      <!-- Player Controls -->
      <div class="debug-section">
        <h3>Player Controls</h3>
        <div class="grid">
          <label>Player Enabled<input id="pcOn" type="checkbox" checked></label>
          <label>Player Speed<input id="pcSpeed" type="range" min="0.5" max="6" step="0.1" value="2.2"><span id="pcSpeedValue">2.2</span></label>
          <label>Auto Wander<input id="pcWander" type="checkbox"></label>
        </div>
        <p class="note">
          <strong>Desktop:</strong> WASD / Arrow Keys to move • R to regenerate • P to pause<br>
          <strong>Mobile:</strong> Tap anywhere on the map to move the wanderer there
        </p>
      </div>
    </div>
  </div>
</div>
<script>
(()=>{
  // ---------- Utilities ----------
  function mulberry32(a){return function(){let t=a+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296;}}
  function makeValueNoise(seed){
    const rand = mulberry32(seed);
    const grad = new Map();
    function g(ix,iy){const k=(ix<<16)^iy; if(!grad.has(k)) grad.set(k, rand()); return grad.get(k)}
    return (x,y)=>{const xi=Math.floor(x), yi=Math.floor(y); const xf=x-xi, yf=y-yi; const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf); const v00=g(xi,yi), v10=g(xi+1,yi), v01=g(xi,yi+1), v11=g(xi+1,yi+1); return (v00*(1-u)+v10*u)*(1-v)+(v01*(1-u)+v11*u)*v;}
  }
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function quantize(v,steps){return Math.floor(v*steps)/steps}
  function hash2(x,y){ let h=x*374761393 + y*668265263; h=(h^(h>>>13))*1274126177; return (h^(h>>>16))>>>0; }

  const canvas = document.getElementById('view');
  const ctx = canvas.getContext('2d');
  if(!ctx){ throw new Error('2D canvas context unavailable'); }
  ctx.imageSmoothingEnabled=false;

  // ---------- Themes ----------
  const THEMES = {
    forest:  { water:[0x1e,0x5b,0xff], grass:[0x58,0xc7,0x69], tree:[0x2f,0x7b,0x45], rock:[0xa0,0x9a,0xa7], sky:[20,18,28] },
    autumn:  { water:[0x1e,0x5b,0xff], grass:[0xd1,0x78,0x3a], tree:[0x83,0x3a,0x1f], rock:[0xa0,0x9a,0xa7], sky:[26,20,20] },
    desert:  { water:[0x3a,0x8f,0xff], grass:[0xe2,0xc8,0x7a], tree:[0xb2,0x8a,0x3b], rock:[0xb7,0xa6,0x88], sky:[30,24,18] },
    swamp:   { water:[0x12,0x3a,0x3a], grass:[0x3a,0x6b,0x49], tree:[0x1e,0x49,0x2a], rock:[0x8a,0x86,0x94], sky:[16,22,20] },
    nocturne:{ water:[0x14,0x2a,0x7a], grass:[0x2c,0x52,0x7a], tree:[0x19,0x3a,0x58], rock:[0x7a,0x78,0x88], sky:[8,10,18] },
  };

  // ---------- State ----------
  const state={
    seed:(Math.random()*1e9)>>>0,
    size:100, steps:4,
    water:0.30, rock:0.78, trees:0.62,
    wind:0.8, shadow:0.35,
    theme:'forest',
    time:0, paused:false,
    heights:null,
    map:null, light:null, tilePx:2,
    todSpeed: 0.02,
    todOn: true,
    todPhase: 0, // bounded phase to avoid floating point drift
    altInfluence: 0.25,
    contours: true,
    contourStep: 0.1,
    // ---- rendering ----
    staticDirty: true, // flag to control when static layer needs redrawing
    // ---- player ----
    pcOn: true,
    pcSpeed: 2.2,
    pcWander: false,
    pcX: 0, pcY: 0, pcVX: 0, pcVY: 0, pcPhase: 0,
    pcTargetX: null, pcTargetY: null, // click/touch target
    keys: new Set(),
    // ---- UI ----
    debugOpen: false,
    // ---- ABYSS gameplay ----
    wandererName: "Wanderer",
    xp: 0,
    sightRadius: 3,
    visited: null, // BitArray for visited tiles
    codex: new Map(), // Discovered features
    totalDiscoveries: 0,
  };

  const TILE={WATER:0, GRASS:1, TREE:2, ROCK:3};
  function shade(rgb, l){ const s=quantize(clamp(l,0,1), state.steps); return `rgb(${(rgb[0]*s)|0}, ${(rgb[1]*s)|0}, ${(rgb[2]*s)|0})`; }

  // ---------- URL Parameter Handling ----------
  function parseSeedFromURL(){
    const urlParams = new URLSearchParams(window.location.search);
    const seedParam = urlParams.get('seed');
    if(seedParam && !isNaN(parseInt(seedParam))){
      return parseInt(seedParam) >>> 0; // ensure unsigned 32-bit int
    }
    return null;
  }
  
  function updateSeedInURL(){
    const url = new URL(window.location);
    url.searchParams.set('seed', state.seed.toString());
    window.history.replaceState({}, '', url);
  }
  
  // ---------- Enhanced Export ----------
  function exportHighRes(){
    // Create a temporary high-resolution canvas (4x)
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    if(!tempCtx) return;
    
    const {size, tilePx}=state;
    const hiResPx = tilePx * 4; // 4x resolution
    const viewPx = size * hiResPx;
    
    tempCanvas.width = tempCanvas.height = viewPx;
    tempCtx.imageSmoothingEnabled = false;
    tempCtx.clearRect(0, 0, viewPx, viewPx);
    
    const pal = THEMES[state.theme];
    const day = dayNightFactor();
    
    // Render static terrain at high resolution
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x; const id=state.map[i];
        const baseL=state.light[i] * day * altitudeFactor(state.heights[i]);
        if(id===TILE.ROCK){ tempCtx.fillStyle=shade(pal.rock, baseL*0.9); tempCtx.fillRect(x*hiResPx,y*hiResPx,hiResPx,hiResPx); }
        else if(id===TILE.TREE){ tempCtx.fillStyle=shade(pal.tree, baseL*0.9); tempCtx.fillRect(x*hiResPx,y*hiResPx,hiResPx,hiResPx); }
        else if(id===TILE.GRASS){ tempCtx.fillStyle=shade(pal.grass, baseL*0.95); tempCtx.fillRect(x*hiResPx,y*hiResPx,hiResPx,hiResPx); }
        else if(id===TILE.WATER){ tempCtx.fillStyle=shade(pal.water, baseL*0.85); tempCtx.fillRect(x*hiResPx,y*hiResPx,hiResPx,hiResPx); }
      }
    }
    
    // Add shadows at high resolution
    const sh=state.shadow * (0.6 + 0.4*day);
    if(sh>0){
      tempCtx.globalAlpha=sh; tempCtx.fillStyle='rgba(0,0,0,1)';
      for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
          const i=y*size+x; const id=state.map[i];
          if(id===TILE.TREE||id===TILE.ROCK){
            const nx=x+1, ny=y+1; if(nx<size&&ny<size){ const j=ny*size+nx; if(state.map[j]!==TILE.WATER){ tempCtx.fillRect(nx*hiResPx,ny*hiResPx,hiResPx,hiResPx);} }
          }
        }
      }
      tempCtx.globalAlpha=1;
    }
    
    // Add contours at high resolution
    if(state.contours){
      tempCtx.globalAlpha=0.12; tempCtx.fillStyle='#000';
      for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
          const h = clamp((state.heights[y*size+x]-state.water)/Math.max(0.0001,(state.rock-state.water)),0,1);
          if((h % state.contourStep) < 0.02){ tempCtx.fillRect(x*hiResPx,y*hiResPx,hiResPx,hiResPx); }
        }
      }
      tempCtx.globalAlpha=1;
    }
    
    // Add player at high resolution if enabled
    if(state.pcOn){
      const bx = Math.floor(state.pcX*hiResPx), by=Math.floor(state.pcY*hiResPx);
      const body=[240,238,180]; const bob=0.9+0.1*Math.sin(state.pcPhase);
      const r=(body[0]*bob)|0, g=(body[1]*bob)|0, b=(body[2]*bob)|0;
      tempCtx.fillStyle='rgba(0,0,0,0.35)'; tempCtx.fillRect(bx+4, by+4, hiResPx, hiResPx); // shadow (4px offset at 4x)
      tempCtx.fillStyle=`rgb(${r},${g},${b})`; tempCtx.fillRect(bx, by, hiResPx, hiResPx);    // body
    }
    
    // Night tint at high resolution
    if(state.todOn){
      const night = 1-day; if(night>0.02){ tempCtx.fillStyle = `rgba(${pal.sky[0]},${pal.sky[1]},${pal.sky[2]},${0.25*night})`; tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height); }
    }
    
    // Download the high-resolution image
    const a=document.createElement('a'); 
    a.download=`abyss_${state.seed}_${state.theme}_4x.png`; 
    a.href=tempCanvas.toDataURL('image/png'); 
    a.click();
  }

  // ---------- Generation ----------
  function regen(newSeed){ if(newSeed!==undefined) state.seed=newSeed>>>0;
    const {size, water, rock, trees}=state;
    const heightN=makeValueNoise(state.seed^0xA53);
    const moistN=makeValueNoise(state.seed^0xBEE);
    const lightN=makeValueNoise(state.seed^0xDAD);
    state.map=new Uint8Array(size*size);
    state.light=new Float32Array(size*size);
    state.heights=new Float32Array(size*size);
    const sH=0.05, sM=0.07, sL=0.03;
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x;
        const h=heightN(x*sH,y*sH);
        const m=moistN(x*sM,y*sM);
        let id=TILE.GRASS;
        if(h<water) id=TILE.WATER; else if(h>rock&&m<0.55) id=TILE.ROCK; else if(m>trees&&h>water+0.05&&h<rock) id=TILE.TREE;
        state.map[i]=id;
        state.heights[i]=h;
        const l=lightN(x*sL+2.3,y*sL+1.7);
        state.light[i]=0.55+0.45*l;
      }
    }
    // Initialize fog-of-war
    state.visited = new Uint8Array(size*size);
    state.xp = 0;
    state.codex.clear();
    state.totalDiscoveries = 0;
    spawnPlayer();
    revealAroundPlayer(); // Reveal initial area
    state.staticDirty = true; // mark static layer as needing redraw
    updateSeedInURL(); // update URL with new seed
    updateStatusPanel();
  }

  // ---------- ABYSS Gameplay Functions ----------
  function revealAroundPlayer(){
    const px = Math.floor(state.pcX), py = Math.floor(state.pcY);
    const radius = state.sightRadius;
    let newTilesRevealed = 0;
    
    for(let dy = -radius; dy <= radius; dy++){
      for(let dx = -radius; dx <= radius; dx++){
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > radius) continue;
        
        const x = px + dx, y = py + dy;
        if(x < 0 || y < 0 || x >= state.size || y >= state.size) continue;
        
        const i = y * state.size + x;
        if(!state.visited[i]){
          state.visited[i] = 1;
          newTilesRevealed++;
          
          // Check for special features to add to codex
          checkForMilestone(x, y);
        }
      }
    }
    
    // Grant XP for newly revealed tiles
    if(newTilesRevealed > 0){
      state.xp += newTilesRevealed;
      updateStatusPanel();
    }
  }
  
  function checkForMilestone(x, y){
    const i = y * state.size + x;
    const tileType = state.map[i];
    const height = state.heights[i];
    
    // Define special features based on tile type and context
    let featureType = null;
    let bonusXP = 0;
    
    if(tileType === TILE.ROCK && height > 0.80){
      featureType = 'peak';
      bonusXP = 5;
    } else if(tileType === TILE.WATER && isLargeWaterBody(x, y)){
      featureType = 'lake';
      bonusXP = 4;
    } else if(tileType === TILE.TREE && isForestGrove(x, y)){
      featureType = 'grove';
      bonusXP = 3;
    } else if(tileType === TILE.GRASS && isOpenMeadow(x, y)){
      featureType = 'meadow';
      bonusXP = 2;
    }
    
    if(featureType){
      const featureKey = `${featureType}_${x}_${y}`;
      if(!state.codex.has(featureKey)){
        const name = generateFeatureName(featureType, x, y);
        state.codex.set(featureKey, {
          name,
          type: featureType,
          x, y,
          discovered: new Date().toISOString()
        });
        state.totalDiscoveries++;
        state.xp += bonusXP;
        
        // Visual feedback for discovery
        console.log(`Discovered: ${name} (${featureType}) at ${x}, ${y} - +${bonusXP} XP`);
        updateStatusPanel();
      }
    }
  }
  
  function isLargeWaterBody(x, y){
    // Check if this water tile is part of a larger body (2x2 minimum)
    let waterCount = 0;
    for(let dy = -1; dy <= 1; dy++){
      for(let dx = -1; dx <= 1; dx++){
        const nx = x + dx, ny = y + dy;
        if(nx >= 0 && ny >= 0 && nx < state.size && ny < state.size){
          const ni = ny * state.size + nx;
          if(state.map[ni] === TILE.WATER) waterCount++;
        }
      }
    }
    return waterCount >= 4;
  }
  
  function isForestGrove(x, y){
    // Check if this tree is part of a dense grove
    let treeCount = 0;
    for(let dy = -1; dy <= 1; dy++){
      for(let dx = -1; dx <= 1; dx++){
        const nx = x + dx, ny = y + dy;
        if(nx >= 0 && ny >= 0 && nx < state.size && ny < state.size){
          const ni = ny * state.size + nx;
          if(state.map[ni] === TILE.TREE) treeCount++;
        }
      }
    }
    return treeCount >= 4;
  }
  
  function isOpenMeadow(x, y){
    // Check if this grass is part of an open meadow (no trees nearby)
    for(let dy = -2; dy <= 2; dy++){
      for(let dx = -2; dx <= 2; dx++){
        const nx = x + dx, ny = y + dy;
        if(nx >= 0 && ny >= 0 && nx < state.size && ny < state.size){
          const ni = ny * state.size + nx;
          if(state.map[ni] === TILE.TREE || state.map[ni] === TILE.ROCK) return false;
        }
      }
    }
    return true;
  }
  
  function generateFeatureName(type, x, y){
    // Deterministic name generation using seed, coordinates, and feature type
    const rand = mulberry32(state.seed ^ (x * 17) ^ (y * 31) ^ (type.charCodeAt(0) * 13));
    
    const prefixes = {
      peak: ['Soaring', 'Crowned', 'Ancient', 'Windswept', 'Solitary', 'Majestic'],
      lake: ['Mirrored', 'Tranquil', 'Hidden', 'Crystal', 'Whispering', 'Sacred'],
      grove: ['Shadowed', 'Singing', 'Twisted', 'Moonlit', 'Forgotten', 'Enchanted'],
      meadow: ['Golden', 'Gentle', 'Endless', 'Peaceful', 'Verdant', 'Dreaming']
    };
    
    const suffixes = {
      peak: ['Summit', 'Spire', 'Crown', 'Peak', 'Pinnacle', 'Height'],
      lake: ['Waters', 'Depths', 'Pool', 'Basin', 'Mere', 'Tarn'],
      grove: ['Grove', 'Thicket', 'Copse', 'Woods', 'Stand', 'Hollow'],
      meadow: ['Fields', 'Meadow', 'Expanse', 'Plains', 'Lea', 'Sward']
    };
    
    const prefix = prefixes[type][Math.floor(rand() * prefixes[type].length)];
    const suffix = suffixes[type][Math.floor(rand() * suffixes[type].length)];
    
    return `${prefix} ${suffix}`;
  }
  
  function updateStatusPanel(){
    document.getElementById('wandererName').textContent = state.wandererName;
    document.getElementById('position').textContent = `${Math.floor(state.pcX)}, ${Math.floor(state.pcY)}`;
    document.getElementById('xpValue').textContent = state.xp;
    document.getElementById('discoveries').textContent = state.totalDiscoveries;
  }

  // ---------- Lighting Helpers ----------
  function dayNightFactor(){
    if(!state.todOn) return 1.0;
    const daylight = Math.sin(state.todPhase * Math.PI);      // 0 at midnight, 1 at noon
    return 0.35 + 0.65*daylight; // 0.35..1.0
  }
  function altitudeFactor(h){
    const a = clamp((h - state.water) / Math.max(0.0001, (state.rock - state.water)), 0, 1);
    return 1.0 + (a - 0.5) * state.altInfluence * 2.0; // 1 +/- altInfluence
  }

  // ---------- Draw Static ----------
  function drawStatic(){
    if (!state.staticDirty) return; // only redraw when necessary
    
    const {size, tilePx}=state; const px=tilePx;
    
    // Calculate canvas size to fit screen while maintaining aspect ratio
    const container = canvas.parentElement;
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;
    const aspectRatio = 1; // square canvas
    
    let canvasSize = Math.min(containerW, containerH) * 0.95;
    canvas.style.width = canvasSize + 'px';
    canvas.style.height = canvasSize + 'px';
    
    const viewPx=size*px;
    canvas.width=canvas.height=viewPx; 
    ctx.imageSmoothingEnabled=false; 
    ctx.clearRect(0,0,viewPx,viewPx);
    
    const pal=THEMES[state.theme];
    const day = dayNightFactor();
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x; const id=state.map[i];
        const baseL=state.light[i] * day * altitudeFactor(state.heights[i]);
        if(id===TILE.ROCK){ ctx.fillStyle=shade(pal.rock, baseL*0.9); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.TREE){ ctx.fillStyle=shade(pal.tree, baseL*0.9); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.GRASS){ ctx.fillStyle=shade(pal.grass, baseL*0.95); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.WATER){ ctx.fillStyle=shade(pal.water, baseL*0.85); ctx.fillRect(x*px,y*px,px,px); }
      }
    }
    // 1‑px hard shadows cast to SE for trees/rocks
    const sh=state.shadow * (0.6 + 0.4*day);
    if(sh>0){
      ctx.globalAlpha=sh; ctx.fillStyle='rgba(0,0,0,1)';
      const s=state.size, px=state.tilePx;
      for(let y=0;y<s;y++){
        for(let x=0;x<s;x++){
          const i=y*s+x; const id=state.map[i];
          if(id===TILE.TREE||id===TILE.ROCK){
            const nx=x+1, ny=y+1; if(nx<s&&ny<s){ const j=ny*s+nx; if(state.map[j]!==TILE.WATER){ ctx.fillRect(nx*px,ny*px,px,px);} }
          }
        }
      }
      ctx.globalAlpha=1;
    }
    // Contour lines for altitude perception
    if(state.contours){
      ctx.globalAlpha=0.12; ctx.fillStyle='#000';
      const s=state.size, px=state.tilePx;
      for(let y=0;y<s;y++){
        for(let x=0;x<s;x++){
          const h = clamp((state.heights[y*s+x]-state.water)/Math.max(0.0001,(state.rock-state.water)),0,1);
          if((h % state.contourStep) < 0.02){ ctx.fillRect(x*px,y*px,px,px); }
        }
      }
      ctx.globalAlpha=1;
    }
    
    // Fog-of-war overlay
    if(state.visited){
      ctx.globalAlpha=0.7; ctx.fillStyle='rgba(0,0,0,1)';
      const s=state.size, px=state.tilePx;
      for(let y=0;y<s;y++){
        for(let x=0;x<s;x++){
          const i=y*s+x;
          if(!state.visited[i]){
            ctx.fillRect(x*px,y*px,px,px);
          }
        }
      }
      ctx.globalAlpha=1;
    }
    
    state.staticDirty = false; // mark as clean after drawing
  }

  // ---------- Draw Animated + Player ----------
  function drawAnim(){
    const {size, tilePx, wind}=state; const px=tilePx; const t=state.time; const pal=THEMES[state.theme];
    const day = dayNightFactor();
    const wf=0.15;
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x; const id=state.map[i]; const baseL=state.light[i] * day * altitudeFactor(state.heights[i]); const h=hash2(x,y);
        if(id===TILE.GRASS){
          const phase=((h&255)/255)*Math.PI*2; const sway=Math.sin(t*wind*0.7+(x+y)*wf+phase)*0.06 * (0.7 + 0.3*day);
          ctx.fillStyle=shade(pal.grass, baseL*0.95+sway); ctx.fillRect(x*px,y*px,px,px);
        } else if(id===TILE.TREE){
          const j=(((h>>>8)&255)/255-0.5)*0.02; const tw=Math.sin(t*0.6+x*0.11+y*0.07)*0.03 * (0.7 + 0.3*day);
          ctx.fillStyle=shade(pal.tree, baseL*0.9+j+tw); ctx.fillRect(x*px,y*px,px,px);
        } else if(id===TILE.WATER){
          const r=Math.sin((x*0.25+t*1.2))*0.06 + Math.cos((y*0.23 - t*0.9))*0.06; const nightBoost = (1-day)*0.5; const sp=((h&1023)===0)?(0.25+nightBoost)*Math.sin(t*8):0;
          ctx.fillStyle=shade(pal.water, baseL*0.85+r+sp); ctx.fillRect(x*px,y*px,px,px);
        }
      }
    }

    // Night tint
    if(state.todOn){
      const pal=THEMES[state.theme]; const night = 1-day; if(night>0.02){ ctx.fillStyle = `rgba(${pal.sky[0]},${pal.sky[1]},${pal.sky[2]},${0.25*night})`; ctx.fillRect(0,0,canvas.width,canvas.height); }
    }

    if(state.pcOn) drawPlayer();
  }

  // ---------- Player ----------
  function spawnPlayer(){
    const s=state.size, cx=(s/2)|0, cy=(s/2)|0;
    let r=0; while(r<s){
      for(let dy=-r; dy<=r; dy++){
        for(let dx=-r; dx<=r; dx++){
          const x=cx+dx, y=cy+dy; if(x<0||y<0||x>=s||y>=s) continue;
          const id=state.map[y*s+x]; if(id!==TILE.WATER){ state.pcX=x+0.5; state.pcY=y+0.5; return; }
        }
      }
      r++;
    }
    state.pcX=cx+0.5; state.pcY=cy+0.5;
  }
  function isWalkable(x,y){ const s=state.size; const ix=Math.floor(x), iy=Math.floor(y); if(ix<0||iy<0||ix>=s||iy>=s) return false; return state.map[iy*s+ix]!==TILE.WATER; }
  function updatePlayer(dt){
    const keys=state.keys; let ax=0, ay=0;
    
    // Store previous position for fog-of-war updates
    const prevX = Math.floor(state.pcX), prevY = Math.floor(state.pcY);
    
    // Keyboard controls
    if(keys.has('arrowleft')||keys.has('a')) ax-=1;
    if(keys.has('arrowright')||keys.has('d')) ax+=1;
    if(keys.has('arrowup')||keys.has('w')) ay-=1;
    if(keys.has('arrowdown')||keys.has('s')) ay+=1;

    // Click/touch target movement
    if(state.pcTargetX !== null && state.pcTargetY !== null && ax === 0 && ay === 0){
      const dx = state.pcTargetX - state.pcX;
      const dy = state.pcTargetY - state.pcY;
      const dist = Math.hypot(dx, dy);
      
      if(dist > 0.3){ // not at target yet
        ax = dx / dist;
        ay = dy / dist;
      } else {
        // Reached target
        state.pcTargetX = null;
        state.pcTargetY = null;
      }
    }

    if(ax!==0||ay!==0){ 
      const l=Math.hypot(ax,ay)||1; 
      ax/=l; ay/=l; 
      state.pcVX=ax*state.pcSpeed; 
      state.pcVY=ay*state.pcSpeed; 
    } else if(state.pcWander){
      const n1=Math.sin(state.time*0.7), n2=Math.cos(state.time*0.53);
      state.pcVX=n1*0.5*state.pcSpeed*0.5; state.pcVY=n2*0.5*state.pcSpeed*0.5;
    } else { 
      state.pcVX=state.pcVY=0; 
    }

    let nx=state.pcX + state.pcVX*dt, ny=state.pcY + state.pcVY*dt;
    if(isWalkable(nx, state.pcY)) state.pcX=nx; else state.pcVX=0;
    if(isWalkable(state.pcX, ny)) state.pcY=ny; else state.pcVY=0;
    state.pcPhase += dt*6;
    
    // Check if player moved to a new tile and update fog-of-war
    const newX = Math.floor(state.pcX), newY = Math.floor(state.pcY);
    if(newX !== prevX || newY !== prevY){
      revealAroundPlayer();
      updateStatusPanel();
      state.staticDirty = true; // Trigger redraw for fog-of-war
    }
  }
  function drawPlayer(){
    const px=state.tilePx; const bx = Math.floor(state.pcX*px), by=Math.floor(state.pcY*px);
    const body=[240,238,180]; const bob=0.9+0.1*Math.sin(state.pcPhase);
    const r=(body[0]*bob)|0, g=(body[1]*bob)|0, b=(body[2]*bob)|0;
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(bx+1, by+1, px, px); // shadow
    ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(bx, by, px, px);    // body
  }

  // ---------- Main Loop ----------
  let last=performance.now();
  function frame(now){
    const rawDt=(now-last)/1000; 
    const dt = Math.min(rawDt, 1/30); // clamp dt to avoid animation jumps after tab switches
    last=now;
    drawStatic();
    if(!state.paused){ 
      state.time+=dt; 
      // Update bounded todPhase to avoid floating point drift
      if(state.todOn){
        state.todPhase = (state.todPhase + dt * state.todSpeed) % 1;
      }
      if(state.pcOn) updatePlayer(dt); 
    }
    drawAnim();
    requestAnimationFrame(frame);
  }

  // ---------- UI ----------
  let regenDebounceTimer = null;
  
  function debounce(func, delay) {
    return function(...args) {
      clearTimeout(regenDebounceTimer);
      regenDebounceTimer = setTimeout(() => func.apply(this, args), delay);
    };
  }
  
  const debouncedRegen = debounce(() => {
    applyUI(); 
    regen();
  }, 300); // 300ms debounce delay
  
  function updateSliderValue(id, value) {
    const valueSpan = document.getElementById(id + 'Value');
    if (valueSpan) {
      valueSpan.textContent = value;
    }
  }
  
  function applyUI(){
    const gs = id=>document.getElementById(id);
    state.size=+gs('size').value;
    state.steps=+gs('steps').value;
    state.theme=gs('theme').value;
    state.water=+gs('water').value;
    state.rock=+gs('rock').value;
    state.trees=+gs('trees').value;
    state.wind=+gs('wind').value;
    state.shadow=+gs('shadow').value;
    state.todSpeed=+gs('todSpeed').value;
    state.todOn=gs('todOn').checked;
    state.altInfluence=+gs('altInfluence').value;
    state.contours=gs('contours').checked;
    state.contourStep=+gs('contourStep').value;
    state.pcOn=gs('pcOn').checked;
    state.pcSpeed=+gs('pcSpeed').value;
    state.pcWander=gs('pcWander').checked;
    
    // Update value displays
    updateSliderValue('size', state.size);
    updateSliderValue('steps', state.steps);
    updateSliderValue('water', state.water.toFixed(2));
    updateSliderValue('rock', state.rock.toFixed(2));
    updateSliderValue('trees', state.trees.toFixed(2));
    updateSliderValue('wind', state.wind.toFixed(2));
    updateSliderValue('shadow', state.shadow.toFixed(2));
    updateSliderValue('todSpeed', state.todSpeed.toFixed(3));
    updateSliderValue('altInfluence', state.altInfluence.toFixed(2));
    updateSliderValue('contourStep', state.contourStep.toFixed(2));
    updateSliderValue('pcSpeed', state.pcSpeed.toFixed(1));
  }
  
  function markStaticDirty() {
    state.staticDirty = true;
  }
  
  function toggleDebugModal(){
    state.debugOpen = !state.debugOpen;
    const modal = document.getElementById('debugModal');
    const toggle = document.getElementById('debugToggle');
    
    if(state.debugOpen){
      modal.classList.add('open');
      toggle.textContent = '× Close';
    } else {
      modal.classList.remove('open');
      toggle.textContent = '⚙️ Debug';
    }
  }
  
  function getCanvasCoordinates(event){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if(event.touches && event.touches[0]){
      clientX = event.touches[0].clientX;
      clientY = event.touches[0].clientY;
    } else {
      clientX = event.clientX;
      clientY = event.clientY;
    }
    
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    
    // Convert to world coordinates
    const worldX = canvasX / state.tilePx;
    const worldY = canvasY / state.tilePx;
    
    return {x: worldX, y: worldY};
  }
  
  (function bindUI(){
    // Debug modal controls
    document.getElementById('debugToggle').onclick = toggleDebugModal;
    document.getElementById('debugClose').onclick = toggleDebugModal;
    
    // Canvas click/touch events
    function handleCanvasClick(event){
      event.preventDefault();
      if(!state.pcOn) return;
      
      const coords = getCanvasCoordinates(event);
      
      // Check if the clicked position is walkable
      if(isWalkable(coords.x, coords.y)){
        state.pcTargetX = coords.x;
        state.pcTargetY = coords.y;
        // Disable auto wander when manually controlling
        state.pcWander = false;
        document.getElementById('pcWander').checked = false;
      }
    }
    
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick);
    
    // Prevent default touch behavior for canvas
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => e.preventDefault());
    
    // Settings controls that affect world generation (debounced)
    const regenIds=['size','steps','theme','water','rock','trees'];
    regenIds.forEach(id=>{ 
      const el=document.getElementById(id); 
      if(!el) return; 
      const evt=el.type==='checkbox'?'change':'input'; 
      el.addEventListener(evt,()=>{ 
        applyUI(); // immediate value update
        if(id === 'theme') {
          markStaticDirty(); // theme changes need static redraw without full regen
        } else {
          debouncedRegen(); // debounced world regeneration
        }
      }); 
    });
    
    // Settings controls that affect rendering (immediate)
    const renderIds=['wind','shadow','todSpeed','todOn','altInfluence','contours','contourStep'];
    renderIds.forEach(id=>{ 
      const el=document.getElementById(id); 
      if(!el) return; 
      const evt=el.type==='checkbox'?'change':'input'; 
      el.addEventListener(evt,()=>{ 
        applyUI();
        markStaticDirty(); // mark for redraw on next frame
      }); 
    });
    
    ['pcOn','pcSpeed','pcWander'].forEach(id=>{ 
      const el=document.getElementById(id); 
      if(!el) return; 
      const evt=el.type==='checkbox'?'change':'input'; 
      el.addEventListener(evt,()=>{ applyUI(); }); 
    });
    
    const regenBtn=document.getElementById('regen'); 
    if(regenBtn) regenBtn.onclick=()=>{applyUI(); regen();};
    
    const pauseBtn=document.getElementById('pause'); 
    if(pauseBtn) pauseBtn.onclick=()=>{state.paused=!state.paused};
    
    const seedBtn=document.getElementById('seed'); 
    if(seedBtn) seedBtn.onclick=()=>{ 
      state.seed=(Math.random()*1e9)>>>0; 
      applyUI(); 
      regen(); 
    };
    
    const exportBtn=document.getElementById('export'); 
    if(exportBtn) exportBtn.onclick=exportHighRes;
    
    // Status panel controls
    const renameBtn=document.getElementById('renameBtn');
    const wandererNameEl=document.getElementById('wandererName');
    if(renameBtn && wandererNameEl){
      renameBtn.onclick = ()=>{
        const newName = prompt('Enter wanderer name:', state.wandererName);
        if(newName && newName.trim()){
          state.wandererName = newName.trim();
          updateStatusPanel();
        }
      };
      
      wandererNameEl.onclick = ()=>{
        const newName = prompt('Enter wanderer name:', state.wandererName);
        if(newName && newName.trim()){
          state.wandererName = newName.trim();
          updateStatusPanel();
        }
      };
    }
    
    const codexBtn=document.getElementById('codexBtn');
    if(codexBtn){
      codexBtn.onclick = ()=>{
        if(state.codex.size === 0){
          alert('No discoveries yet! Explore to find special features and landmarks.');
          return;
        }
        
        let codexText = `=== CODEX OF DISCOVERIES ===\n\n`;
        const discoveries = Array.from(state.codex.values()).sort((a, b) => 
          new Date(a.discovered) - new Date(b.discovered)
        );
        
        discoveries.forEach((entry, i) => {
          codexText += `${i + 1}. ${entry.name}\n`;
          codexText += `   Type: ${entry.type}\n`;
          codexText += `   Location: ${entry.x}, ${entry.y}\n\n`;
        });
        
        alert(codexText);
      };
    }
    
    // keyboard
    window.addEventListener('keydown', (e)=>{
      state.keys.add(e.key.toLowerCase());
      if(e.key==='r' || e.key==='R'){ applyUI(); regen(); }
      if(e.key==='p' || e.key==='P'){ state.paused=!state.paused; }
      if(e.key==='Escape'){ 
        if(state.debugOpen) toggleDebugModal(); 
      }
    });
    
    window.addEventListener('keyup', (e)=>{ 
      state.keys.delete(e.key.toLowerCase()); 
    });
    
    // Handle window resize
    window.addEventListener('resize', () => {
      markStaticDirty();
    });
  })();

  // ---------- Self-tests ----------
  (function runSelfTests(){
    try{
      regen(state.seed);
      console.assert(state.map && state.map.length===state.size*state.size, 'Map size mismatch');
      const dn=dayNightFactor(); console.assert(dn>=0.35 && dn<=1.0, 'Day/Night factor out of range', dn);
      const mid=(state.water+state.rock)/2; const af=altitudeFactor(mid); console.assert(Math.abs(af-1.0) < 0.61, 'Altitude influence baseline unexpected', af);
    }catch(err){ console.error('Self-test error:', err); }
  })();

  // ---------- Init ----------
  // Parse seed from URL if present
  const urlSeed = parseSeedFromURL();
  if(urlSeed !== null) {
    state.seed = urlSeed;
  }
  
  applyUI();
  regen(state.seed);
  requestAnimationFrame(frame);
})();
</script>
