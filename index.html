<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Minimal Adventure</title>
<style>
  :root{--bg:#000;--panel:#0a0a0a;--ink:#b6ffb6;--mut:#79b879;--accent:#caffd1;--ok:#9bffb0;--warn:#ffe38a;--bad:#ff6a8b} 
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font:12px/1.6 'Press Start 2P', monospace; letter-spacing:0.5px} 
  .wrap{max-width:980px;margin:0 auto;padding:12px}
  h1{font-size:16px;margin:6px 0 10px}
  .terminal-container{max-width:800px;margin:0 auto}
  .panel{background:var(--panel);border:2px solid #1b1b1b;border-radius:2px;box-shadow:0 0 0 2px #0f0f0f inset, 0 0 24px #000} 
  #term{height:420px;overflow:auto;padding:16px;white-space:pre-wrap;background:#000;border-bottom:2px solid #1b1b1b;text-shadow:0 0 6px rgba(146,255,166,0.45)} 
  #inputRow{display:flex;gap:8px;padding:10px;border-top:2px solid #1b1b1b;background:#000} 
  input[type=text]{flex:1;background:#000;border:2px solid #1b1b1b;border-radius:2px;color:var(--ink);padding:10px 12px;caret-color:var(--ink)} 
  button{background:#000;border:2px solid #1b1b1b;color:var(--ink);border-radius:2px;padding:8px 10px;cursor:pointer} 
  button:disabled{opacity:.45;cursor:not-allowed}
  button:hover{border-color:#44aa66;box-shadow:0 0 0 2px #003311 inset} 
  .bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px;border-top:2px solid #1b1b1b;background:#000} 
  .bar .label{font-size:12px;color:var(--mut);padding:2px 0;width:100%}
  .chip{background:#000;border:2px solid #1b1b1b;border-radius:2px;padding:6px 8px;font-size:12px} 
  .chip.dir{border-style:dashed} 
  .mini-status{justify-content:space-between;align-items:center}
  .status-item{font-size:10px;color:var(--mut)}
  #side{display:flex;flex-direction:column;gap:10px}
  .mini{padding:10px}
  .mini h3{margin:0 0 6px 0;font-size:10px;color:var(--mut)}
  .tag{display:inline-block;border:2px solid #1b1b1b;border-radius:2px;padding:4px 6px;font-size:10px;color:var(--mut);margin:0 4px 4px 0;background:#000}
  .ok{border-color:#2b6f54;color:var(--ok)}
  .warn{border-color:#7a5a2a;color:var(--warn)}
  .bad{border-color:#6a2b3a;color:var(--bad)}
</style>
</head>
<body>
<!-- Ambient audio for atmosphere -->
<audio id="ambientAudio" loop>
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DwylgcBSuLx+3WlDsKE3m+8+OVRgwLVK/j" type="audio/wav">
</audio>

<!-- Sound effects -->
<audio id="takeSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRsQDAABXQVZFZm10IBAAAAABAAEAgD4AAIA+AAABAAgAZGF0YQAAAABVrF1Oq1WvL6LH8bWl" type="audio/wav">
</audio>

<audio id="lightSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRsQDAABXQVZFZm10IBAAAAABAAEAgD4AAIA+AAABAAgAZGF0YQAAAABVkXRel3XLM6rK9Lup" type="audio/wav">
</audio>
<div class="wrap">
  <h1>Minimal Adventure</h1>
  <div class="terminal-container">
    <div class="panel">
      <div id="term"></div>
      <div class="bar mini-status">
        <span class="status-item">Location: <span id="where-inline">—</span></span>
        <span class="status-item">Items: <span id="inv-inline">—</span></span>
      </div>
      <div class="bar" id="verbBar"><span class="label">Verbs (discovered)</span></div>
      <div class="bar" id="nounBar"><span class="label">Nouns (you can currently reference)</span></div>
      <div id="inputRow">
        <input id="cmd" type="text" placeholder="Type commands: LOOK / EXAMINE BOX / LIGHT CANDLE WITH MATCHES"/>
        <button id="doBtn">Do</button>
      </div>
    </div>
  </div>
</div>
<!-- Adventure Registry and Engine Scripts -->
<script src="js/adventure-registry.js"></script>
<script src="adventures/minimal.js"></script>
<script src="adventures/abyss.js"></script>
<script src="js/if-engine.js"></script>

<script>
// Initialize the Interactive Fiction Engine
let gameEngine;

// Auto-start the minimal adventure
document.addEventListener('DOMContentLoaded', async () => {
  gameEngine = new InteractiveFictionEngine();
  
  // Start ambient audio
  try {
    const ambient = document.getElementById('ambientAudio');
    if(ambient) {
      ambient.volume = 0.1;
      ambient.play().catch(()=>{}); // Ignore autoplay restrictions
    }
  } catch(e) {}
  
  // Load and start the minimal adventure by default
  await gameEngine.startAdventure('minimal');
});

// Global function for switching adventures (for future use)
window.switchAdventure = async function(adventureId) {
  if (gameEngine) {
    await gameEngine.startAdventure(adventureId);
  }
};

// Legacy support - expose engine methods globally for compatibility
window.Game = {
  get currentEngine() { return gameEngine; }
};
</script>
</body>
</html>
