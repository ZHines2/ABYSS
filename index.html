<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Pixel Biome — 2D + Little Wanderer</title>
  <style>
    :root{ --bg:#0e0d11; --ink:#e7eaff; --panel:#1a1822; --border:#4e456a; --debug:#1a1b2e; }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}
    
    /* Fullscreen layout */
    .container{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column}
    .canvas-container{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;max-width:100vw;max-height:100vh}
    
    /* Header */
    .header{position:absolute;top:0;left:0;right:0;z-index:100;padding:12px 16px;background:linear-gradient(to bottom, rgba(14,13,17,0.95), transparent);backdrop-filter:blur(4px)}
    .title{font-size:18px;margin:0;text-align:center}
    .title-sub{opacity:0.7;font-size:14px}
    
    /* Debug toggle button */
    .debug-toggle{position:absolute;top:16px;right:16px;z-index:300;background:var(--debug);border:1px solid var(--border);color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all 0.2s ease}
    .debug-toggle:hover{background:#252640;transform:scale(1.05)}
    
    /* Debug modal */
    .debug-modal{position:fixed;top:0;right:0;width:min(380px,100vw);height:100vh;background:var(--debug);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.3s ease;z-index:200;overflow-y:auto;scrollbar-width:thin}
    .debug-modal.open{transform:translateX(0)}
    .debug-modal::-webkit-scrollbar{width:6px}
    .debug-modal::-webkit-scrollbar-track{background:var(--debug)}
    .debug-modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    
    .debug-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .debug-title{font-size:14px;font-weight:bold;margin:0}
    .debug-close{background:none;border:none;color:var(--ink);font-size:18px;cursor:pointer;padding:4px;border-radius:4px}
    .debug-close:hover{background:var(--border)}
    
    .debug-content{padding:16px}
    .debug-section{margin-bottom:24px}
    .debug-section h3{font-size:12px;color:#8892b0;margin:0 0 12px 0;text-transform:uppercase;letter-spacing:0.5px}
    
    .btn{cursor:pointer;background:#22253c;border:1px solid #5e64a8;color:#e7eaff;padding:6px 10px;border-radius:6px;font-size:11px;margin:2px}
    .btn:hover{background:#2a2d4a;transform:translateY(-1px)}
    .btn-group{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
    
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    label{display:flex;flex-direction:column;gap:6px;font-size:11px;line-height:1.3}
    select, input[type=range]{width:100%;padding:4px}
    input[type=checkbox]{margin-right:8px}
    .note{font-size:10px;opacity:0.75;line-height:1.4;margin-top:12px}
    
    /* Mobile optimizations */
    @media (max-width: 768px) {
      .debug-modal{width:100vw}
      .debug-toggle{top:12px;right:12px;padding:6px 10px;font-size:11px}
      .header{padding:8px 12px}
      .title{font-size:16px}
      .title-sub{font-size:12px}
      canvas{touch-action:none}
    }
    
    /* Mobile landscape */
    @media (max-width: 768px) and (orientation: landscape) {
      .debug-modal{width:50vw;min-width:300px}
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1 class="title">ABYSS <span class="title-sub">Pixel Biome Explorer</span></h1>
    <div id="inventory" style="position:absolute;right:120px;top:50%;transform:translateY(-50%);font-size:12px;background:rgba(14,13,17,0.8);padding:8px 12px;border-radius:6px;border:1px solid var(--border)">
      <div style="display:flex;gap:12px;margin-bottom:4px">
        <span>💎 <span id="gemCount">0</span></span>
        <span>🪙 <span id="coinCount">0</span></span>
        <span>🔮 <span id="crystalCount">0</span></span>
        <span>⚱️ <span id="artifactCount">0</span></span>
      </div>
      <div id="objective" style="font-size:10px;opacity:0.8;text-align:center">
        Collect treasures to explore!
      </div>
    </div>
  </div>
  
  <!-- Debug Toggle Button -->
  <button class="debug-toggle" id="debugToggle">⚙️ Debug</button>
  
  <!-- Canvas Container -->
  <div class="canvas-container">
    <canvas id="view" width="240" height="240"></canvas>
  </div>
  
  <!-- Debug Modal -->
  <div class="debug-modal" id="debugModal">
    <div class="debug-header">
      <h2 class="debug-title">Debug Controls</h2>
      <button class="debug-close" id="debugClose">×</button>
    </div>
    <div class="debug-content">
      
      <!-- Control Buttons -->
      <div class="debug-section">
        <h3>Actions</h3>
        <div class="btn-group">
          <button class="btn" id="regen">Regenerate (R)</button>
          <button class="btn" id="pause">Pause (P)</button>
          <button class="btn" id="seed">New Seed</button>
          <button class="btn" id="export">Export PNG</button>
        </div>
      </div>
      
      <!-- World Generation -->
      <div class="debug-section">
        <h3>World Generation</h3>
        <div class="grid">
          <label>World Size<input id="size" type="range" min="40" max="160" step="20" value="100"></label>
          <label>Palette Steps<input id="steps" type="range" min="2" max="8" value="4"></label>
          <label>Palette Theme
            <select id="theme">
              <option value="forest">Forest</option>
              <option value="autumn">Autumn</option>
              <option value="desert">Desert</option>
              <option value="swamp">Swamp</option>
              <option value="nocturne">Nocturne</option>
            </select>
          </label>
          <label>Water Level<input id="water" type="range" min="0.15" max="0.5" step="0.01" value="0.30"></label>
          <label>Rock Height<input id="rock" type="range" min="0.6" max="0.9" step="0.01" value="0.78"></label>
          <label>Tree Moisture<input id="trees" type="range" min="0.45" max="0.85" step="0.01" value="0.62"></label>
        </div>
      </div>
      
      <!-- Visual Effects -->
      <div class="debug-section">
        <h3>Visual Effects</h3>
        <div class="grid">
          <label>Wind Speed<input id="wind" type="range" min="0" max="2.0" step="0.01" value="0.8"></label>
          <label>Shadow Strength<input id="shadow" type="range" min="0" max="0.6" step="0.02" value="0.35"></label>
          <label>Day/Night Enabled<input id="todOn" type="checkbox" checked></label>
          <label>Day/Night Speed<input id="todSpeed" type="range" min="0" max="0.1" step="0.005" value="0.02"></label>
          <label>Altitude Influence<input id="altInfluence" type="range" min="0" max="0.6" step="0.02" value="0.25"></label>
          <label>Contours<input id="contours" type="checkbox" checked></label>
          <label>Contour Step<input id="contourStep" type="range" min="0.05" max="0.3" step="0.01" value="0.1"></label>
        </div>
      </div>
      
      <!-- Player Controls -->
      <div class="debug-section">
        <h3>Player Controls</h3>
        <div class="grid">
          <label>Player Enabled<input id="pcOn" type="checkbox" checked></label>
          <label>Player Speed<input id="pcSpeed" type="range" min="0.5" max="6" step="0.1" value="2.2"></label>
          <label>Auto Wander<input id="pcWander" type="checkbox"></label>
        </div>
        <p class="note">
          <strong>Desktop:</strong> WASD / Arrow Keys to move • R to regenerate • P to pause<br>
          <strong>Mobile:</strong> Tap anywhere on the map to move the wanderer there
        </p>
      </div>
    </div>
  </div>
</div>
<script>
(()=>{
  // ---------- Utilities ----------
  function mulberry32(a){return function(){let t=a+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296;}}
  function makeValueNoise(seed){
    const rand = mulberry32(seed);
    const grad = new Map();
    function g(ix,iy){const k=(ix<<16)^iy; if(!grad.has(k)) grad.set(k, rand()); return grad.get(k)}
    return (x,y)=>{const xi=Math.floor(x), yi=Math.floor(y); const xf=x-xi, yf=y-yi; const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf); const v00=g(xi,yi), v10=g(xi+1,yi), v01=g(xi,yi+1), v11=g(xi+1,yi+1); return (v00*(1-u)+v10*u)*(1-v)+(v01*(1-u)+v11*u)*v;}
  }
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function quantize(v,steps){return Math.floor(v*steps)/steps}
  function hash2(x,y){ let h=x*374761393 + y*668265263; h=(h^(h>>>13))*1274126177; return (h^(h>>>16))>>>0; }

  const canvas = document.getElementById('view');
  const ctx = canvas.getContext('2d');
  if(!ctx){ throw new Error('2D canvas context unavailable'); }
  ctx.imageSmoothingEnabled=false;

  // ---------- Themes ----------
  const THEMES = {
    forest:  { water:[0x1e,0x5b,0xff], grass:[0x58,0xc7,0x69], tree:[0x2f,0x7b,0x45], rock:[0xa0,0x9a,0xa7], sky:[20,18,28] },
    autumn:  { water:[0x1e,0x5b,0xff], grass:[0xd1,0x78,0x3a], tree:[0x83,0x3a,0x1f], rock:[0xa0,0x9a,0xa7], sky:[26,20,20] },
    desert:  { water:[0x3a,0x8f,0xff], grass:[0xe2,0xc8,0x7a], tree:[0xb2,0x8a,0x3b], rock:[0xb7,0xa6,0x88], sky:[30,24,18] },
    swamp:   { water:[0x12,0x3a,0x3a], grass:[0x3a,0x6b,0x49], tree:[0x1e,0x49,0x2a], rock:[0x8a,0x86,0x94], sky:[16,22,20] },
    nocturne:{ water:[0x14,0x2a,0x7a], grass:[0x2c,0x52,0x7a], tree:[0x19,0x3a,0x58], rock:[0x7a,0x78,0x88], sky:[8,10,18] },
  };

  // ---------- State ----------
  const state={
    seed:(Math.random()*1e9)>>>0,
    size:100, steps:4,
    water:0.30, rock:0.78, trees:0.62,
    wind:0.8, shadow:0.35,
    theme:'forest',
    time:0, paused:false,
    heights:null,
    map:null, light:null, tilePx:2,
    todSpeed: 0.02,
    todOn: true,
    altInfluence: 0.25,
    contours: true,
    contourStep: 0.1,
    // ---- player ----
    pcOn: true,
    pcSpeed: 2.2,
    pcWander: false,
    pcX: 0, pcY: 0, pcVX: 0, pcVY: 0, pcPhase: 0,
    pcTargetX: null, pcTargetY: null, // click/touch target
    keys: new Set(),
    // ---- adventure ----
    items: new Map(), // x,y -> item type
    landmarks: new Map(), // x,y -> landmark type
    inventory: {gems: 0, coins: 0, artifacts: 0, crystals: 0},
    objectives: {collectGems: 10, totalCollected: 0, landmarksFound: 0},
    discovered: new Set(), // discovered coordinates as "x,y"
    // ---- UI ----
    debugOpen: false,
  };

  const TILE={WATER:0, GRASS:1, TREE:2, ROCK:3};
  const ITEM={GEM:0, COIN:1, ARTIFACT:2, CRYSTAL:3};
  const LANDMARK={RUINS:0, OBELISK:1, SHRINE:2};
  function shade(rgb, l){ const s=quantize(clamp(l,0,1), state.steps); return `rgb(${(rgb[0]*s)|0}, ${(rgb[1]*s)|0}, ${(rgb[2]*s)|0})`; }

  // ---------- Generation ----------
  function generateItems(){
    state.items.clear();
    state.landmarks.clear();
    // Reset inventory and objectives on new world
    state.inventory = {gems: 0, coins: 0, artifacts: 0, crystals: 0};
    state.objectives = {collectGems: 10, totalCollected: 0, landmarksFound: 0};
    updateInventoryDisplay();
    
    const {size} = state;
    const itemRand = mulberry32(state.seed ^ 0xFEED);
    const landmarkRand = mulberry32(state.seed ^ 0xBEAD);
    
    // Generate landmarks first (rarer, need good placement)
    for(let attempts = 0; attempts < size * 0.1; attempts++){
      const x = Math.floor(landmarkRand() * size);
      const y = Math.floor(landmarkRand() * size);
      const i = y * size + x;
      
      // Place landmarks on high ground, away from water
      if(state.map[i] === TILE.GRASS && state.heights[i] > 0.6){
        const key = `${x},${y}`;
        if(!state.landmarks.has(key)){
          const rnd = landmarkRand();
          let landmarkType;
          if(rnd < 0.4) landmarkType = LANDMARK.RUINS;
          else if(rnd < 0.7) landmarkType = LANDMARK.OBELISK;
          else landmarkType = LANDMARK.SHRINE;
          
          state.landmarks.set(key, landmarkType);
        }
      }
    }
    
    // Generate items on walkable tiles
    for(let attempts = 0; attempts < size * 0.8; attempts++){
      const x = Math.floor(itemRand() * size);
      const y = Math.floor(itemRand() * size);
      const i = y * size + x;
      
      // Only place items on grass or near trees (not water/rocks)
      if(state.map[i] === TILE.GRASS || state.map[i] === TILE.TREE){
        const key = `${x},${y}`;
        if(!state.items.has(key) && !state.landmarks.has(key)){
          // Determine item type based on location and randomness
          const heightFactor = state.heights[i];
          const rnd = itemRand();
          
          let itemType;
          if(rnd < 0.4) itemType = ITEM.GEM;        // Common
          else if(rnd < 0.7) itemType = ITEM.COIN;  // Common
          else if(rnd < 0.9) itemType = ITEM.CRYSTAL; // Uncommon
          else itemType = ITEM.ARTIFACT;            // Rare
          
          state.items.set(key, itemType);
        }
      }
    }
  }

  function regen(newSeed){ if(newSeed!==undefined) state.seed=newSeed>>>0;
    const {size, water, rock, trees}=state;
    const heightN=makeValueNoise(state.seed^0xA53);
    const moistN=makeValueNoise(state.seed^0xBEE);
    const lightN=makeValueNoise(state.seed^0xDAD);
    state.map=new Uint8Array(size*size);
    state.light=new Float32Array(size*size);
    state.heights=new Float32Array(size*size);
    const sH=0.05, sM=0.07, sL=0.03;
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x;
        const h=heightN(x*sH,y*sH);
        const m=moistN(x*sM,y*sM);
        let id=TILE.GRASS;
        if(h<water) id=TILE.WATER; else if(h>rock&&m<0.55) id=TILE.ROCK; else if(m>trees&&h>water+0.05&&h<rock) id=TILE.TREE;
        state.map[i]=id;
        state.heights[i]=h;
        const l=lightN(x*sL+2.3,y*sL+1.7);
        state.light[i]=0.55+0.45*l;
      }
    }
    generateItems();
    spawnPlayer();
    drawStatic();
  }

  // ---------- Lighting Helpers ----------
  function dayNightFactor(){
    if(!state.todOn) return 1.0;
    const phase = (state.time * state.todSpeed) % 1; // 0..1
    const daylight = Math.sin(phase * Math.PI);      // 0 at midnight, 1 at noon
    return 0.35 + 0.65*daylight; // 0.35..1.0
  }
  function altitudeFactor(h){
    const a = clamp((h - state.water) / Math.max(0.0001, (state.rock - state.water)), 0, 1);
    return 1.0 + (a - 0.5) * state.altInfluence * 2.0; // 1 +/- altInfluence
  }

  // ---------- Draw Static ----------
  function drawStatic(){
    const {size, tilePx}=state; const px=tilePx;
    
    // Calculate canvas size to fit screen while maintaining aspect ratio
    const container = canvas.parentElement;
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;
    const aspectRatio = 1; // square canvas
    
    let canvasSize = Math.min(containerW, containerH) * 0.95;
    canvas.style.width = canvasSize + 'px';
    canvas.style.height = canvasSize + 'px';
    
    const viewPx=size*px;
    canvas.width=canvas.height=viewPx; 
    ctx.imageSmoothingEnabled=false; 
    ctx.clearRect(0,0,viewPx,viewPx);
    
    const pal=THEMES[state.theme];
    const day = dayNightFactor();
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x; const id=state.map[i];
        const baseL=state.light[i] * day * altitudeFactor(state.heights[i]);
        if(id===TILE.ROCK){ ctx.fillStyle=shade(pal.rock, baseL*0.9); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.TREE){ ctx.fillStyle=shade(pal.tree, baseL*0.9); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.GRASS){ ctx.fillStyle=shade(pal.grass, baseL*0.95); ctx.fillRect(x*px,y*px,px,px); }
        else if(id===TILE.WATER){ ctx.fillStyle=shade(pal.water, baseL*0.85); ctx.fillRect(x*px,y*px,px,px); }
      }
    }
    // 1‑px hard shadows cast to SE for trees/rocks
    const sh=state.shadow * (0.6 + 0.4*day);
    if(sh>0){
      ctx.globalAlpha=sh; ctx.fillStyle='rgba(0,0,0,1)';
      const s=state.size, px=state.tilePx;
      for(let y=0;y<s;y++){
        for(let x=0;x<s;x++){
          const i=y*s+x; const id=state.map[i];
          if(id===TILE.TREE||id===TILE.ROCK){
            const nx=x+1, ny=y+1; if(nx<s&&ny<s){ const j=ny*s+nx; if(state.map[j]!==TILE.WATER){ ctx.fillRect(nx*px,ny*px,px,px);} }
          }
        }
      }
      ctx.globalAlpha=1;
    }
    // Contour lines for altitude perception
    if(state.contours){
      ctx.globalAlpha=0.12; ctx.fillStyle='#000';
      const s=state.size, px=state.tilePx;
      for(let y=0;y<s;y++){
        for(let x=0;x<s;x++){
          const h = clamp((state.heights[y*s+x]-state.water)/Math.max(0.0001,(state.rock-state.water)),0,1);
          if((h % state.contourStep) < 0.02){ ctx.fillRect(x*px,y*px,px,px); }
        }
      }
      ctx.globalAlpha=1;
    }
  }

  // ---------- Draw Animated + Player ----------
  function drawAnim(){
    const {size, tilePx, wind}=state; const px=tilePx; const t=state.time; const pal=THEMES[state.theme];
    const day = dayNightFactor();
    const wf=0.15;
    for(let y=0;y<size;y++){
      for(let x=0;x<size;x++){
        const i=y*size+x; const id=state.map[i]; const baseL=state.light[i] * day * altitudeFactor(state.heights[i]); const h=hash2(x,y);
        if(id===TILE.GRASS){
          const phase=((h&255)/255)*Math.PI*2; const sway=Math.sin(t*wind*0.7+(x+y)*wf+phase)*0.06 * (0.7 + 0.3*day);
          ctx.fillStyle=shade(pal.grass, baseL*0.95+sway); ctx.fillRect(x*px,y*px,px,px);
        } else if(id===TILE.TREE){
          const j=(((h>>>8)&255)/255-0.5)*0.02; const tw=Math.sin(t*0.6+x*0.11+y*0.07)*0.03 * (0.7 + 0.3*day);
          ctx.fillStyle=shade(pal.tree, baseL*0.9+j+tw); ctx.fillRect(x*px,y*px,px,px);
        } else if(id===TILE.WATER){
          const r=Math.sin((x*0.25+t*1.2))*0.06 + Math.cos((y*0.23 - t*0.9))*0.06; const nightBoost = (1-day)*0.5; const sp=((h&1023)===0)?(0.25+nightBoost)*Math.sin(t*8):0;
          ctx.fillStyle=shade(pal.water, baseL*0.85+r+sp); ctx.fillRect(x*px,y*px,px,px);
        }
      }
    }

    // Night tint
    if(state.todOn){
      const pal=THEMES[state.theme]; const night = 1-day; if(night>0.02){ ctx.fillStyle = `rgba(${pal.sky[0]},${pal.sky[1]},${pal.sky[2]},${0.25*night})`; ctx.fillRect(0,0,canvas.width,canvas.height); }
    }

    // Draw items
    drawItems();
    
    if(state.pcOn) drawPlayer();
  }

  // ---------- Player ----------
  function spawnPlayer(){
    const s=state.size, cx=(s/2)|0, cy=(s/2)|0;
    let r=0; while(r<s){
      for(let dy=-r; dy<=r; dy++){
        for(let dx=-r; dx<=r; dx++){
          const x=cx+dx, y=cy+dy; if(x<0||y<0||x>=s||y>=s) continue;
          const id=state.map[y*s+x]; if(id!==TILE.WATER){ state.pcX=x+0.5; state.pcY=y+0.5; return; }
        }
      }
      r++;
    }
    state.pcX=cx+0.5; state.pcY=cy+0.5;
  }
  function isWalkable(x,y){ const s=state.size; const ix=Math.floor(x), iy=Math.floor(y); if(ix<0||iy<0||ix>=s||iy>=s) return false; return state.map[iy*s+ix]!==TILE.WATER; }
  // ---------- Items & Collection ----------
  function collectItem(x, y, itemType){
    const itemNames = ['gems', 'coins', 'artifacts', 'crystals'];
    const itemName = itemNames[itemType];
    state.inventory[itemName]++;
    state.objectives.totalCollected++;
    updateInventoryDisplay();
    
    // Simple audio feedback simulation (visual flash)
    const px = state.tilePx;
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(x * px - 1, y * px - 1, px + 2, px + 2);
    ctx.restore();
  }

  function discoverLandmark(x, y, landmarkType){
    state.objectives.landmarksFound++;
    updateInventoryDisplay();
    
    // Visual discovery effect
    const px = state.tilePx;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(x * px - 2, y * px - 2, px + 4, px + 4);
    ctx.restore();
  }

  function updateInventoryDisplay(){
    document.getElementById('gemCount').textContent = state.inventory.gems;
    document.getElementById('coinCount').textContent = state.inventory.coins;
    document.getElementById('crystalCount').textContent = state.inventory.crystals;
    document.getElementById('artifactCount').textContent = state.inventory.artifacts;
    
    // Update objective display
    const totalItems = state.objectives.totalCollected;
    const landmarks = state.objectives.landmarksFound;
    const objectiveEl = document.getElementById('objective');
    
    if(totalItems === 0 && landmarks === 0){
      objectiveEl.textContent = "Collect treasures & discover landmarks!";
    } else if(landmarks > 0){
      objectiveEl.textContent = `${totalItems} treasures, ${landmarks} landmark${landmarks > 1 ? 's' : ''} found! 🗺️`;
    } else if(totalItems < 5){
      objectiveEl.textContent = "Great start! Keep exploring...";
    } else if(totalItems < 15){
      objectiveEl.textContent = `${totalItems} treasures found! 🎉`;
    } else {
      objectiveEl.textContent = `Master explorer! ${totalItems} treasures! 🏆`;
    }
  }

  function drawItems(){
    const px = state.tilePx;
    const t = state.time;
    
    // Draw collectible items
    state.items.forEach((itemType, key) => {
      const [x, y] = key.split(',').map(Number);
      const screenX = x * px;
      const screenY = y * px;
      
      // Sparkle animation
      const sparkle = 0.8 + 0.2 * Math.sin(t * 4 + x + y);
      ctx.globalAlpha = sparkle;
      
      // Different colors for different items
      switch(itemType){
        case ITEM.GEM:
          ctx.fillStyle = '#FF69B4'; // Pink gem
          break;
        case ITEM.COIN:
          ctx.fillStyle = '#FFD700'; // Gold coin
          break;
        case ITEM.CRYSTAL:
          ctx.fillStyle = '#00CED1'; // Cyan crystal
          break;
        case ITEM.ARTIFACT:
          ctx.fillStyle = '#9370DB'; // Purple artifact
          break;
      }
      
      ctx.fillRect(screenX, screenY, px, px);
      ctx.globalAlpha = 1;
    });
    
    // Draw landmarks
    state.landmarks.forEach((landmarkType, key) => {
      const [x, y] = key.split(',').map(Number);
      const screenX = x * px;
      const screenY = y * px;
      const discovered = state.discovered.has(key);
      
      // Pulsing effect for undiscovered landmarks
      let alpha = discovered ? 1.0 : 0.7 + 0.3 * Math.sin(t * 2 + x * 0.1 + y * 0.1);
      ctx.globalAlpha = alpha;
      
      // Different colors/patterns for different landmarks
      switch(landmarkType){
        case LANDMARK.RUINS:
          ctx.fillStyle = discovered ? '#8B4513' : '#654321'; // Brown ruins
          ctx.fillRect(screenX, screenY, px, px);
          if(discovered){
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(screenX, screenY, 1, 1); // Highlight pixel
          }
          break;
        case LANDMARK.OBELISK:
          ctx.fillStyle = discovered ? '#2F4F4F' : '#1C3A3A'; // Dark slate obelisk
          ctx.fillRect(screenX, screenY, px, px);
          if(discovered){
            ctx.fillStyle = '#708090';
            ctx.fillRect(screenX, screenY, 1, 1); // Highlight pixel
          }
          break;
        case LANDMARK.SHRINE:
          ctx.fillStyle = discovered ? '#4B0082' : '#2E0051'; // Indigo shrine
          ctx.fillRect(screenX, screenY, px, px);
          if(discovered){
            ctx.fillStyle = '#9370DB';
            ctx.fillRect(screenX, screenY, 1, 1); // Highlight pixel
          }
          break;
      }
      
      ctx.globalAlpha = 1;
    });
  }
  
  function updatePlayer(dt){
    const keys=state.keys; let ax=0, ay=0;
    
    // Keyboard controls
    if(keys.has('arrowleft')||keys.has('a')) ax-=1;
    if(keys.has('arrowright')||keys.has('d')) ax+=1;
    if(keys.has('arrowup')||keys.has('w')) ay-=1;
    if(keys.has('arrowdown')||keys.has('s')) ay+=1;

    // Click/touch target movement
    if(state.pcTargetX !== null && state.pcTargetY !== null && ax === 0 && ay === 0){
      const dx = state.pcTargetX - state.pcX;
      const dy = state.pcTargetY - state.pcY;
      const dist = Math.hypot(dx, dy);
      
      if(dist > 0.3){ // not at target yet
        ax = dx / dist;
        ay = dy / dist;
      } else {
        // Reached target
        state.pcTargetX = null;
        state.pcTargetY = null;
      }
    }

    if(ax!==0||ay!==0){ 
      const l=Math.hypot(ax,ay)||1; 
      ax/=l; ay/=l; 
      state.pcVX=ax*state.pcSpeed; 
      state.pcVY=ay*state.pcSpeed; 
    } else if(state.pcWander){
      const n1=Math.sin(state.time*0.7), n2=Math.cos(state.time*0.53);
      state.pcVX=n1*0.5*state.pcSpeed*0.5; state.pcVY=n2*0.5*state.pcSpeed*0.5;
    } else { 
      state.pcVX=state.pcVY=0; 
    }

    let nx=state.pcX + state.pcVX*dt, ny=state.pcY + state.pcVY*dt;
    if(isWalkable(nx, state.pcY)) state.pcX=nx; else state.pcVX=0;
    if(isWalkable(state.pcX, ny)) state.pcY=ny; else state.pcVY=0;
    
    // Check for item collection
    const px = Math.floor(state.pcX), py = Math.floor(state.pcY);
    const key = `${px},${py}`;
    if(state.items.has(key)){
      collectItem(px, py, state.items.get(key));
      state.items.delete(key);
    }
    
    // Check for landmark discovery
    if(state.landmarks.has(key) && !state.discovered.has(key)){
      discoverLandmark(px, py, state.landmarks.get(key));
      state.discovered.add(key);
    }
    
    state.pcPhase += dt*6;
  }
  function drawPlayer(){
    const px=state.tilePx; const bx = Math.floor(state.pcX*px), by=Math.floor(state.pcY*px);
    const body=[240,238,180]; const bob=0.9+0.1*Math.sin(state.pcPhase);
    const r=(body[0]*bob)|0, g=(body[1]*bob)|0, b=(body[2]*bob)|0;
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(bx+1, by+1, px, px); // shadow
    ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(bx, by, px, px);    // body
  }

  // ---------- Main Loop ----------
  let last=performance.now();
  function frame(now){
    const dt=(now-last)/1000; last=now;
    drawStatic();
    if(!state.paused){ state.time+=dt; if(state.pcOn) updatePlayer(dt); }
    drawAnim();
    requestAnimationFrame(frame);
  }

  // ---------- UI ----------
  function applyUI(){
    const gs = id=>document.getElementById(id);
    state.size=+gs('size').value;
    state.steps=+gs('steps').value;
    state.theme=gs('theme').value;
    state.water=+gs('water').value;
    state.rock=+gs('rock').value;
    state.trees=+gs('trees').value;
    state.wind=+gs('wind').value;
    state.shadow=+gs('shadow').value;
    state.todSpeed=+gs('todSpeed').value;
    state.todOn=gs('todOn').checked;
    state.altInfluence=+gs('altInfluence').value;
    state.contours=gs('contours').checked;
    state.contourStep=+gs('contourStep').value;
    state.pcOn=gs('pcOn').checked;
    state.pcSpeed=+gs('pcSpeed').value;
    state.pcWander=gs('pcWander').checked;
  }
  
  function toggleDebugModal(){
    state.debugOpen = !state.debugOpen;
    const modal = document.getElementById('debugModal');
    const toggle = document.getElementById('debugToggle');
    
    if(state.debugOpen){
      modal.classList.add('open');
      toggle.textContent = '× Close';
    } else {
      modal.classList.remove('open');
      toggle.textContent = '⚙️ Debug';
    }
  }
  
  function getCanvasCoordinates(event){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if(event.touches && event.touches[0]){
      clientX = event.touches[0].clientX;
      clientY = event.touches[0].clientY;
    } else {
      clientX = event.clientX;
      clientY = event.clientY;
    }
    
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    
    // Convert to world coordinates
    const worldX = canvasX / state.tilePx;
    const worldY = canvasY / state.tilePx;
    
    return {x: worldX, y: worldY};
  }
  
  (function bindUI(){
    // Debug modal controls
    document.getElementById('debugToggle').onclick = toggleDebugModal;
    document.getElementById('debugClose').onclick = toggleDebugModal;
    
    // Canvas click/touch events
    function handleCanvasClick(event){
      event.preventDefault();
      if(!state.pcOn) return;
      
      const coords = getCanvasCoordinates(event);
      
      // Check if the clicked position is walkable
      if(isWalkable(coords.x, coords.y)){
        state.pcTargetX = coords.x;
        state.pcTargetY = coords.y;
        // Disable auto wander when manually controlling
        state.pcWander = false;
        document.getElementById('pcWander').checked = false;
      }
    }
    
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick);
    
    // Prevent default touch behavior for canvas
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => e.preventDefault());
    
    // Settings controls
    const ids=['size','steps','theme','water','rock','trees','wind','shadow','todSpeed','todOn','altInfluence','contours','contourStep'];
    ids.forEach(id=>{ 
      const el=document.getElementById(id); 
      if(!el) return; 
      const evt=el.type==='checkbox'?'change':'input'; 
      el.addEventListener(evt,()=>{ applyUI(); regen(); }); 
    });
    
    ['pcOn','pcSpeed','pcWander'].forEach(id=>{ 
      const el=document.getElementById(id); 
      if(!el) return; 
      const evt=el.type==='checkbox'?'change':'input'; 
      el.addEventListener(evt,()=>{ applyUI(); }); 
    });
    
    const regenBtn=document.getElementById('regen'); 
    if(regenBtn) regenBtn.onclick=()=>{applyUI(); regen();};
    
    const pauseBtn=document.getElementById('pause'); 
    if(pauseBtn) pauseBtn.onclick=()=>{state.paused=!state.paused};
    
    const seedBtn=document.getElementById('seed'); 
    if(seedBtn) seedBtn.onclick=()=>{ state.seed=(Math.random()*1e9)>>>0; applyUI(); regen(); };
    
    const exportBtn=document.getElementById('export'); 
    if(exportBtn) exportBtn.onclick=()=>{ 
      const a=document.createElement('a'); 
      a.download=`abyss_${state.seed}_${state.theme}.png`; 
      a.href=canvas.toDataURL('image/png'); 
      a.click(); 
    };
    
    // keyboard
    window.addEventListener('keydown', (e)=>{
      state.keys.add(e.key.toLowerCase());
      if(e.key==='r' || e.key==='R'){ applyUI(); regen(); }
      if(e.key==='p' || e.key==='P'){ state.paused=!state.paused; }
      if(e.key==='Escape'){ 
        if(state.debugOpen) toggleDebugModal(); 
      }
    });
    
    window.addEventListener('keyup', (e)=>{ 
      state.keys.delete(e.key.toLowerCase()); 
    });
    
    // Handle window resize
    window.addEventListener('resize', () => {
      drawStatic();
    });
  })();

  // ---------- Self-tests ----------
  (function runSelfTests(){
    try{
      regen(state.seed);
      console.assert(state.map && state.map.length===state.size*state.size, 'Map size mismatch');
      const dn=dayNightFactor(); console.assert(dn>=0.35 && dn<=1.0, 'Day/Night factor out of range', dn);
      const mid=(state.water+state.rock)/2; const af=altitudeFactor(mid); console.assert(Math.abs(af-1.0) < 0.61, 'Altitude influence baseline unexpected', af);
    }catch(err){ console.error('Self-test error:', err); }
  })();

  // ---------- Init ----------
  applyUI();
  regen(state.seed);
  requestAnimationFrame(frame);
})();
</script>
